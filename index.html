<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0E14">
<title>BTC Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --card:#11151F; --border:#1E2530;
    --text:#E6EAF2; --muted:#8A94A6;
    --up:#2FBF71; --down:#E5484D; --warn:#F5A623; --steel:#5B8DEF;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:'IBM Plex Mono', ui-monospace, monospace;
    min-height:100vh; padding:16px 14px calc(24px + env(safe-area-inset-bottom));
    max-width:520px; margin:0 auto;
  }
  header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
  h1{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; letter-spacing:.02em}
  h1 span{color:var(--steel)}
  #refresh{
    background:var(--card); border:1px solid var(--border); color:var(--text);
    font:inherit; font-size:13px; padding:9px 16px; border-radius:8px; cursor:pointer;
    transition:border-color .15s;
  }
  #refresh:active{border-color:var(--steel)}
  #refresh:focus-visible{outline:2px solid var(--steel); outline-offset:2px}
  #refresh[disabled]{opacity:.5}

  .verdict{
    border:1px solid var(--border); border-left:4px solid var(--muted);
    background:var(--card); border-radius:10px; padding:14px 14px 12px; margin-bottom:12px;
  }
  .verdict.ok{border-left-color:var(--up)}
  .verdict.risk{border-left-color:var(--down)}
  .verdict.mixed{border-left-color:var(--warn)}
  .verdict .tag{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
  .verdict p{font-size:13.5px; line-height:1.55}

  .price-card{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:14px; margin-bottom:12px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
  }
  .price-card .px{font-size:30px; font-weight:600; letter-spacing:-.01em; font-variant-numeric:tabular-nums}
  .price-card .chg{font-size:13px}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .stat{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px;
  }
  .stat .label{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
  .stat .val{font-size:17px; font-weight:500; font-variant-numeric:tabular-nums}
  .stat .sub{font-size:11px; color:var(--muted); margin-top:4px}
  .pos{color:var(--up)} .neg{color:var(--down)} .warn{color:var(--warn)}

  footer{margin-top:14px; font-size:11px; color:var(--muted); display:flex; justify-content:space-between}
  #err{
    display:none; background:#2A1215; border:1px solid #5C2226; color:#F2B8B5;
    border-radius:10px; padding:12px; font-size:12.5px; line-height:1.5; margin-bottom:12px;
  }
  .skeleton{color:var(--muted)}
  @media (prefers-reduced-motion: no-preference){
    .updating{animation:pulse .8s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.45}}
  }
</style>
</head>
<body>
<header>
  <h1>BTC<span>·</span>PULSE</h1>
  <button id="refresh" onclick="load()">Refresh</button>
</header>

<div id="err"></div>

<div class="verdict" id="verdict">
  <div class="tag">Read</div>
  <p id="verdict-text" class="skeleton">Tap refresh to pull live data.</p>
</div>

<div class="price-card">
  <div class="px" id="px">—</div>
  <div class="chg" id="chg1h">1h —</div>
  <div class="chg" id="chg4h">4h —</div>
  <div class="chg" id="chg24h">24h —</div>
</div>

<div class="grid">
  <div class="stat"><div class="label">Funding rate</div><div class="val" id="funding">—</div><div class="sub" id="funding-sub"></div></div>
  <div class="stat"><div class="label">Next funding</div><div class="val" id="nextf">—</div><div class="sub">countdown</div></div>
  <div class="stat"><div class="label">Open interest</div><div class="val" id="oi">—</div><div class="sub" id="oi-usd"></div></div>
  <div class="stat"><div class="label">OI Δ 1h / 4h</div><div class="val" id="oid">—</div><div class="sub">futures positioning</div></div>
  <div class="stat"><div class="label">Taker buy/sell</div><div class="val" id="taker">—</div><div class="sub">1h aggressor flow</div></div>
  <div class="stat"><div class="label">Top trader L/S</div><div class="val" id="topls">—</div><div class="sub">positions, 1h</div></div>
</div>

<footer>
  <div id="src">source: —</div>
  <div id="ts"></div>
</footer>

<script>
const $ = id => document.getElementById(id);
const fmtPct = (v, dp=2) => (v>=0?'+':'') + v.toFixed(dp) + '%';
const cls = v => v>=0 ? 'pos' : 'neg';
const fmtUsd = v => v>=1e9 ? '$'+(v/1e9).toFixed(2)+'B' : '$'+(v/1e6).toFixed(0)+'M';

async function j(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(url+' -> '+r.status);
  return r.json();
}

async function fromBinance(){
  const B='https://fapi.binance.com';
  const [t24, prem, kl, oiHist, taker, topls] = await Promise.all([
    j(B+'/fapi/v1/ticker/24hr?symbol=BTCUSDT'),
    j(B+'/fapi/v1/premiumIndex?symbol=BTCUSDT'),
    j(B+'/fapi/v1/klines?symbol=BTCUSDT&interval=1h&limit=5'),
    j(B+'/futures/data/openInterestHist?symbol=BTCUSDT&period=1h&limit=5'),
    j(B+'/futures/data/takerlongshortRatio?symbol=BTCUSDT&period=1h&limit=1'),
    j(B+'/futures/data/topLongShortPositionRatio?symbol=BTCUSDT&period=1h&limit=1'),
  ]);
  const px = +prem.markPrice;
  const closes = kl.map(k=>+k[4]);
  const oiNow = +oiHist[4].sumOpenInterest, oi1h = +oiHist[3].sumOpenInterest, oi4h = +oiHist[0].sumOpenInterest;
  return {
    source:'Binance USDT-M',
    px,
    chg1h:(px/closes[3]-1)*100,
    chg4h:(px/closes[0]-1)*100,
    chg24h:+t24.priceChangePercent,
    funding:+prem.lastFundingRate*100,
    nextFundingTime:+prem.nextFundingTime,
    oiBtc:oiNow,
    oiUsd:+oiHist[4].sumOpenInterestValue,
    oiD1h:(oiNow/oi1h-1)*100,
    oiD4h:(oiNow/oi4h-1)*100,
    taker:+taker[0].buySellRatio,
    topls:+topls[0].longShortRatio,
  };
}

async function fromBybit(){
  const B='https://api.bybit.com';
  const [tick, kl, oiH] = await Promise.all([
    j(B+'/v5/market/tickers?category=linear&symbol=BTCUSDT'),
    j(B+'/v5/market/kline?category=linear&symbol=BTCUSDT&interval=60&limit=5'),
    j(B+'/v5/market/open-interest?category=linear&symbol=BTCUSDT&intervalTime=1h&limit=5'),
  ]);
  const t = tick.result.list[0];
  const px = +t.lastPrice;
  const closes = kl.result.list.map(k=>+k[4]); // newest first
  const oiL = oiH.result.list; // newest first
  const oiNow = +oiL[0].openInterest, oi1h=+oiL[1].openInterest, oi4h=+oiL[4].openInterest;
  return {
    source:'Bybit linear (fallback)',
    px,
    chg1h:(px/closes[1]-1)*100,
    chg4h:(px/closes[4]-1)*100,
    chg24h:+t.price24hPcnt*100,
    funding:+t.fundingRate*100,
    nextFundingTime:+t.nextFundingTime,
    oiBtc:oiNow,
    oiUsd:oiNow*px,
    oiD1h:(oiNow/oi1h-1)*100,
    oiD4h:(oiNow/oi4h-1)*100,
    taker:null,
    topls:null,
  };
}

function verdict(d){
  const pDown = d.chg1h < -0.15, pUp = d.chg1h > 0.15;
  const oiDown = d.oiD1h < -0.25, oiUp = d.oiD1h > 0.25;
  let cls='mixed', msg;

  if(pDown && oiDown){
    cls='ok';
    msg=`Price down ${d.chg1h.toFixed(2)}% with OI dropping ${d.oiD1h.toFixed(2)}% — longs closing or getting flushed, not fresh selling. Deleveraging pullback; POI mitigation has better odds of holding.`;
  } else if(pDown && oiUp){
    cls='risk';
    msg=`Price down ${d.chg1h.toFixed(2)}% while OI is building ${fmtPct(d.oiD1h)} — new shorts opening into the move. This is aggressive selling, not a healthy pullback. Wait for stronger confirmation.`;
  } else if(pUp && oiUp){
    cls='ok';
    msg=`Price up ${fmtPct(d.chg1h)} with OI expanding ${fmtPct(d.oiD1h)} — fresh longs backing the move with new money.`;
  } else if(pUp && oiDown){
    cls='mixed';
    msg=`Price up ${fmtPct(d.chg1h)} but OI shrinking ${d.oiD1h.toFixed(2)}% — likely short covering, weaker fuel for continuation.`;
  } else {
    msg=`Flat hour (${fmtPct(d.chg1h)} price, ${fmtPct(d.oiD1h)} OI). No strong positioning signal — lean on your HTF structure.`;
  }

  if(d.funding <= -0.01) msg += ` Funding is negative (${d.funding.toFixed(4)}%): shorts paying, crowded downside — squeeze fuel.`;
  else if(d.funding >= 0.02) msg += ` Funding elevated (${d.funding.toFixed(4)}%): longs crowded, watch for a flush.`;

  if(d.taker !== null){
    if(d.taker < 0.9) msg += ` Taker flow ${d.taker.toFixed(2)} — sellers hitting market.`;
    else if(d.taker > 1.1) msg += ` Taker flow ${d.taker.toFixed(2)} — buyers lifting offers.`;
  }
  return {cls, msg};
}

function countdown(ts){
  const s = Math.max(0, ts - Date.now());
  const h = Math.floor(s/3.6e6), m = Math.floor(s%3.6e6/6e4);
  return h+'h '+String(m).padStart(2,'0')+'m';
}

function render(d){
  $('px').textContent = d.px.toLocaleString('en-US',{maximumFractionDigits:1});
  for(const [id,v] of [['chg1h',d.chg1h],['chg4h',d.chg4h],['chg24h',d.chg24h]]){
    $(id).textContent = id.replace('chg','')+' '+fmtPct(v);
    $(id).className = 'chg '+cls(v);
  }
  $('funding').textContent = d.funding.toFixed(4)+'%';
  $('funding').className = 'val '+(d.funding>=0.02?'warn':d.funding<0?'neg':'');
  $('funding-sub').textContent = 'annualized ~'+(d.funding*3*365).toFixed(1)+'%';
  $('nextf').textContent = countdown(d.nextFundingTime);
  $('oi').textContent = (d.oiBtc/1000).toFixed(1)+'k BTC';
  $('oi-usd').textContent = fmtUsd(d.oiUsd);
  $('oid').innerHTML = `<span class="${cls(d.oiD1h)}">${fmtPct(d.oiD1h)}</span> / <span class="${cls(d.oiD4h)}">${fmtPct(d.oiD4h)}</span>`;
  $('taker').textContent = d.taker===null?'n/a':d.taker.toFixed(3);
  $('topls').textContent = d.topls===null?'n/a':d.topls.toFixed(3);
  const v = verdict(d);
  const vd = $('verdict');
  vd.className = 'verdict '+v.cls;
  $('verdict-text').textContent = v.msg;
  $('verdict-text').classList.remove('skeleton');
  $('src').textContent = 'source: '+d.source;
  $('ts').textContent = new Date().toLocaleTimeString();
}

async function load(){
  const btn = $('refresh');
  btn.disabled = true; btn.textContent = '…';
  $('err').style.display='none';
  document.body.classList.add('updating');
  try{
    let d;
    try{ d = await fromBinance(); }
    catch(e){ d = await fromBybit(); }
    render(d);
  }catch(e){
    $('err').style.display='block';
    $('err').textContent = 'Could not reach Binance or Bybit public APIs. Check your connection — some networks or regions block exchange endpoints. ('+e.message+')';
  }finally{
    btn.disabled = false; btn.textContent = 'Refresh';
    document.body.classList.remove('updating');
  }
}
load();
</script>
</body>
</html>
